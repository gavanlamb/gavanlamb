name: GitHub Followers

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual triggering of the workflow

permissions:
  contents: read

jobs:
  sync:
    name: Synchronise
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: python -m pip install 'requests>=2.32,<3'

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run sync script
        run: python src/scripts/sync_followers.py
        env:
          # A fine-grained PAT needs the user-level Followers permission set to write.
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          EXPECTED_GITHUB_USERNAME: ${{ github.repository_owner }}
          EXCLUDED_ACCOUNTS: 'cupel-co,wakatime,aheinze,peterallanmdavid'
